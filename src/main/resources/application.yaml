spring:
  application:
    name: technologie-backendowe-projekt
  datasource:
    url: jdbc:postgresql://${DB_ADDRESS}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 300 # 5m
    refresh-token-expiration: 604800 # 7d
server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_PASSWORD}
    key-store-type: PKCS12
    key-alias: ${KEY_ALIAS}